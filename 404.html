<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="icon" type="image/png" href="img/img1.PNG">
    <script>
        // Redirecciones personalizadas
        const routes = {
            '/': '/index.html',
            '/home': '/index.html#home',
            '/galeria': '/gallery.html',
            '/eventos': '/gallery.html',
            '/contacto': '/index.html#contact',
            '/expositores': '/index.html#vendors',
            '/nosotros': '/index.html#about'
        };

        const currentPath = window.location.pathname;
        
        if (routes[currentPath]) {
            window.location.href = routes[currentPath];
        } else {
            // Para cualquier otra ruta, redirige al home
            window.location.href = '/index.html';
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
